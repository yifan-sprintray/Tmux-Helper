name: Main source branch

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - ready_for_review

jobs:
  require-development-source:
    name: Require development source
    runs-on: ubuntu-latest
    steps:
      - name: Validate source branch
        run: |
          if [ "${{ github.head_ref }}" != "development" ]; then
            echo "Pull requests to main must come from the development branch."
            echo "Current source branch: ${{ github.head_ref }}"
            exit 1
          fi
